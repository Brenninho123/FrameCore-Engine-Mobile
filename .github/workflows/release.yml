name: FrameCoreEngine Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build + Release Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # HAXE SETUP
      # =========================
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # =========================
      # CACHE (OPTIONAL SAFE)
      # =========================
      - name: Cache haxelib
        uses: actions/cache@v4
        with:
          path: C:\haxelib
          key: haxelib-${{ runner.os }}

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        shell: cmd
        run: |
          haxelib setup C:\haxelib
          haxelib install lime -always
          haxelib install openfl -always
          haxelib install flixel -always
          haxelib install flixel-tools -always
          haxelib install hxcpp -always
          haxelib run lime setup -y

      # =========================
      # OPTIONAL SETUP SCRIPT
      # =========================
      - name: Setup project scripts
        shell: cmd
        run: |
          if exist setup\windows.bat call setup\windows.bat

      # =========================
      # CLEAN BUILD (CRITICAL FIX)
      # =========================
      - name: Build game (CLEAN + VERBOSE)
        shell: cmd
        working-directory: .
        run: |
          haxelib run lime clean windows
          haxelib run lime build windows -release -D officialBuild -clean -verbose

      # =========================
      # VERIFY ASSETS (HARD FAIL)
      # =========================
      - name: Verify generated assets
        shell: pwsh
        run: |
          $assets = "export/release/windows/bin/assets"

          if (!(Test-Path $assets)) {
            Write-Host "❌ CRITICAL: assets folder not generated"
            exit 1
          }

          $required = @(
            "base_game",
            "week_assets",
            "images",
            "weeks",
            "songs",
            "shared",
            "fonts"
          )

          foreach ($folder in $required) {
            if (!(Test-Path "$assets/$folder")) {
              Write-Host "❌ MISSING: $folder"
              exit 1
            } else {
              Write-Host "✔ OK: $folder"
            }
          }

          Write-Host "✅ All critical assets present"

      # =========================
      # EXTRA SAFETY COPY (CI FIX BACKUP)
      # =========================
      - name: Force asset copy (CI fallback safety)
        shell: pwsh
        run: |
          $src = "assets"
          $dst = "export/release/windows/bin/assets"

          if (!(Test-Path $dst)) {
            New-Item -ItemType Directory -Path $dst -Force
          }

          robocopy $src $dst /E /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -ge 8) {
            Write-Host "❌ Robocopy failed"
            exit 1
          }

      # =========================
      # ZIP BUILD
      # =========================
      - name: Zip build
        shell: pwsh
        run: |
          $path = "export/release/windows/bin"

          if (!(Test-Path $path)) {
            Write-Host "❌ Build folder missing"
            exit 1
          }

          Compress-Archive -Path "$path/*" -DestinationPath FrameCoreEngine-Windows.zip -Force

      # =========================
      # RELEASE
      # =========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FrameCoreEngine-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # DISCORD NOTIFY
      # =========================
      - name: Notify Discord
        if: success()
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $releaseUrl = "https://github.com/$repo/releases/tag/$tag"

          $body = @{
            username = "FrameCore Engine"
            embeds = @(
              @{
                title = "Nueva release: $tag"
                url = $releaseUrl
                description = "Build completado correctamente."
                color = 5814783
              }
            )
          } | ConvertTo-Json -Depth 5

          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK }}" `
            -Method Post `
            -Body $body `
            -ContentType "application/json"
